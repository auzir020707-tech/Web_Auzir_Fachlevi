<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f2027">
<title>Bantuan Sosial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  flex-wrap:wrap;
}

.header h2{
  font-size:18px;
}

/* MENU */
.menu{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
}

.menu button{
  margin:5px;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  font-size:13px;
}

.menu button.active,
.menu button:hover{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.profile{
  width:35px;
  height:35px;
  border-radius:50%;
  margin-left:10px;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
}

.card{
  padding:12px;
  border-radius:12px;
  font-size:13px;
  background:rgba(255,255,255,0.08);
}

/* MAIN */
.main{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

/* BOX */
.box{
  width:100%;
  max-width:350px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.07);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
  font-size:14px;
}

/* OPSI */
.opsi{
  padding:12px;
  border-radius:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.15);
  cursor:pointer;
  font-size:14px;
}

.opsi:hover{
  transform:scale(1.03);
}

.selected{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
}

/* BUTTON */
.vote{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  font-size:14px;
}

/* BAR */
.bar{
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
}

.fill{
  height:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border-radius:10px;
}

/* CHART */
canvas{
  width:100% !important;
  height:auto !important;
}

/* RESPONSIVE */
@media (max-width:480px){
  .header{
    flex-direction:column;
    align-items:flex-start;
  }
  .menu{
    margin-top:10px;
  }
  .box{
    max-width:100%;
  }
  .header h2{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>🌐 Bantuan untuk korban bencana</h2>
  <div class="menu">
    <button id="btnVoting" onclick="showPage('voting')">Voting</button>
    <button id="btnHasil" onclick="showPage('hasil')">Hasil</button>
    <button id="btnAdmin" onclick="showPage('admin')">Admin</button>
    <img src="https://i.pravatar.cc/100" class="profile">
  </div>
</div>

<div class="container">

<div class="stats">
  <div class="card">🏠 Desa: karieng</div>
  <div class="card">👥 Pemilih: <span id="pemilih">0</span></div>
  <div class="card">📦 Bantuan: 3</div>
  <div class="card">🟢 Status: Aktif</div>
</div>

<div class="main">

<div id="votingPage" class="box">
  <h3>Pilihan bantuan</h3>
  <input type="text" id="nik" placeholder="Masukkan NIK">

  <div class="opsi" onclick="pilih('beras',this)">🍚 Beras</div>
  <div class="opsi" onclick="pilih('uang',this)">💰 Uang</div>
  <div class="opsi" onclick="pilih('bibit',this)">🌱 Bibit</div>

  <button class="vote" onclick="vote()">Kirim</button>
</div>

<div id="hasilPage" class="box" style="display:none">
  <h3>Hasil</h3>

  Beras: <span id="beras">0</span>
  <div class="bar"><div id="b1" class="fill"></div></div>

  Uang: <span id="uang">0</span>
  <div class="bar"><div id="b2" class="fill"></div></div>

  Bibit: <span id="bibit">0</span>
  <div class="bar"><div id="b3" class="fill"></div></div>
</div>

<div id="adminPage" class="box" style="display:none">
  <h3>Admin</h3>
  <button class="vote" onclick="resetData()">Reset Data</button>
</div>

<div class="box">
  <h3>Grafik</h3>
  <canvas id="chart"></canvas>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || {beras:0, uang:0, bibit:0};
let pemilih = JSON.parse(localStorage.getItem('pemilih')) || [];
let pilihan=null;

function setActive(btn){
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function showPage(p){
  votingPage.style.display='none';
  hasilPage.style.display='none';
  adminPage.style.display='none';

  if(p==='voting'){votingPage.style.display='block';setActive(btnVoting)}
  if(p==='hasil'){hasilPage.style.display='block';setActive(btnHasil)}
  if(p==='admin'){adminPage.style.display='block';setActive(btnAdmin)}
}

function pilih(p,e){
  pilihan=p;
  document.querySelectorAll('.opsi').forEach(o=>o.classList.remove('selected'));
  e.classList.add('selected');
}

function vote(){
  let nik=document.getElementById('nik').value;

  if(!nik) return alert('Isi NIK');
  if(pemilih.includes(nik)) return alert('Sudah memilih');
  if(!pilihan) return alert('Pilih bantuan');

  data[pilihan]++;
  pemilih.push(nik);

  localStorage.setItem('data',JSON.stringify(data));
  localStorage.setItem('pemilih',JSON.stringify(pemilih));

  update();
}

function resetData(){
  if(confirm("Reset semua data?")){
    localStorage.clear();
    location.reload();
  }
}

let chart;
function buatChart(){
  chart=new Chart(document.getElementById('chart'),{
    type:'pie',
    data:{
      labels:['Beras','Uang','Bibit'],
      datasets:[{
        data:[data.beras,data.uang,data.bibit]
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });
}

function update(){
  let total=data.beras+data.uang+data.bibit;

  beras.innerText=data.beras;
  uang.innerText=data.uang;
  bibit.innerText=data.bibit;
  pemilih.innerText=pemilih.length;

  b1.style.width= total? (data.beras/total*100)+'%':'0%';
  b2.style.width= total? (data.uang/total*100)+'%':'0%';
  b3.style.width= total? (data.bibit/total*100)+'%':'0%';

  chart.data.datasets[0].data=[data.beras,data.uang,data.bibit];
  chart.update();
}

buatChart();
update();
showPage('voting');
</script>

</body>
</html>
