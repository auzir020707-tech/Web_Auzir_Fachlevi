<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantuan bencana sosial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

/* THEME */
:root{
    --bg: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    --card: rgba(255,255,255,0.08);
    --text: white;
}

.light{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#222;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.menu{
    display:flex;
    align-items:center;
    gap:5px;
}

.menu button{
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    color:var(--text);
    cursor:pointer;
}

.menu button.active,
.menu button:hover{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.profile{
    width:35px;
    height:35px;
    border-radius:50%;
    border:2px solid #00c6ff;
}

/* CONTENT */
.container{padding:15px}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.card{
    padding:12px;
    border-radius:12px;
    background:var(--card);
}

/* SLIDE SYSTEM (HP friendly) */
.main{
    margin-top:20px;
    display:flex;
    gap:15px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}

.box{
    min-width:320px;
    flex:0 0 auto;
    padding:20px;
    border-radius:15px;
    background:var(--card);
    scroll-snap-align:start;
}

/* FORM */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    font-size:16px;
}

.opsi{
    padding:12px;
    border-radius:10px;
    margin:6px 0;
    background:rgba(255,255,255,0.15);
    cursor:pointer;
}

.selected{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.vote{
    margin-top:10px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* BAR */
.bar{
    height:10px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
}

.fill{
    height:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .menu{
        width:100%;
        justify-content:space-between;
    }

    .profile{
        display:none;
    }

    .box{
        min-width:85%;
    }
}
</style>
</head>

<body>

<div class="header">
    <h3>🌐 Bantuan bencana</h3>
    <div class="menu">
        <button id="btnVoting" onclick="showPage('voting')">Voting</button>
        <button id="btnHasil" onclick="showPage('hasil')">Hasil</button>
        <button id="btnAdmin" onclick="showPage('admin')">Admin</button>
        <button onclick="toggleMode()">🌙</button>
        <img src="https://i.pravatar.cc/100" class="profile">
    </div>
</div>

<div class="container">

<div class="stats">
    <div class="card">🏠 Desa: Karieng</div>
    <div class="card">👥 Pemilih: <span id="pemilih">0</span></div>
    <div class="card">📦 Bantuan: 3</div>
    <div class="card">🟢 Status: Aktif</div>
</div>

<div class="main">

<!-- VOTING -->
<div id="votingPage" class="box">
    <h3>Pilihan bantuan</h3>
    <input type="text" id="nik" placeholder="Masukkan NIK">

    <div class="opsi" onclick="pilih('beras',this)">🍚 Beras</div>
    <div class="opsi" onclick="pilih('uang',this)">💰 Uang</div>
    <div class="opsi" onclick="pilih('bibit',this)">🌱 Bibit</div>

    <button class="vote" onclick="vote()">Kirim</button>
</div>

<!-- GRAFIK (di samping) -->
<div class="box">
    <h3>Grafik</h3>
    <canvas id="chart"></canvas>
</div>

<!-- HASIL -->
<div id="hasilPage" class="box">
    <h3>Hasil</h3>

    Beras: <span id="beras">0</span>
    <div class="bar"><div id="b1" class="fill"></div></div>

    Uang: <span id="uang">0</span>
    <div class="bar"><div id="b2" class="fill"></div></div>

    Bibit: <span id="bibit">0</span>
    <div class="bar"><div id="b3" class="fill"></div></div>
</div>

<!-- ADMIN -->
<div id="adminPage" class="box">
    <h3>Admin</h3>
    <button class="vote" onclick="resetData()">Reset Data</button>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')) || {beras:0, uang:0, bibit:0};
let pemilih = JSON.parse(localStorage.getItem('pemilih')) || [];
let pilihan=null;

function showPage(p){
    document.getElementById('votingPage').style.display = p==='voting'?'block':'none';
    document.getElementById('hasilPage').style.display = p==='hasil'?'block':'none';
    document.getElementById('adminPage').style.display = p==='admin'?'block':'none';
}

function pilih(p,e){
    pilihan=p;
    document.querySelectorAll('.opsi').forEach(o=>o.classList.remove('selected'));
    e.classList.add('selected');
}

function vote(){
    let nik=document.getElementById('nik').value;

    if(!nik) return alert('Isi NIK');
    if(pemilih.includes(nik)) return alert('Sudah memilih');
    if(!pilihan) return alert('Pilih bantuan');

    data[pilihan]++;
    pemilih.push(nik);

    localStorage.setItem('data',JSON.stringify(data));
    localStorage.setItem('pemilih',JSON.stringify(pemilih));

    update();
}

function resetData(){
    if(confirm("Reset semua data?")){
        localStorage.clear();
        location.reload();
    }
}

/* DARK MODE */
function toggleMode(){
    document.body.classList.toggle('light');
    if(document.body.classList.contains('light')){
        localStorage.setItem('mode','light');
    }else{
        localStorage.setItem('mode','dark');
    }
}

if(localStorage.getItem('mode')==='light'){
    document.body.classList.add('light');
}

/* CHART */
let chart;
function buatChart(){
    chart=new Chart(document.getElementById('chart'),{
        type:'pie',
        data:{
            labels:['Beras','Uang','Bibit'],
            datasets:[{
                data:[data.beras,data.uang,data.bibit]
            }]
        }
    });
}

function update(){
    let total=data.beras+data.uang+data.bibit;

    document.getElementById('beras').innerText=data.beras;
    document.getElementById('uang').innerText=data.uang;
    document.getElementById('bibit').innerText=data.bibit;
    document.getElementById('pemilih').innerText=pemilih.length;

    document.getElementById('b1').style.width= total? (data.beras/total*100)+'%':'0%';
    document.getElementById('b2').style.width= total? (data.uang/total*100)+'%':'0%';
    document.getElementById('b3').style.width= total? (data.bibit/total*100)+'%':'0%';

    chart.data.datasets[0].data=[data.beras,data.uang,data.bibit];
    chart.update();
}

buatChart();
update();
showPage('voting');
</script>

</body>
</html>
