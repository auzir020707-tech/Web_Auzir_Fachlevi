<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Senja Coffee Premium</title>

    <style>
      :root {
        --primary: #c67c4e;
        --dark: #0b0b0b;
        --card: #141414;
        --glass: rgba(255, 255, 255, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: var(--dark);
        color: #fff;
      }

      /* NAV MODERN */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        position: fixed;
        width: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      nav h2 {
        color: var(--primary);
        font-weight: 600;
      }

      nav a {
        color: #ddd;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
      }

      nav a:hover {
        color: white;
      }

      /* HERO PREMIUM */
      .hero {
        height: 100vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.9)),
          url("https://images.unsplash.com/photo-1442512595331-e89e73853f31")
            center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }

      .hero h1 {
        font-size: 48px;
        max-width: 700px;
        line-height: 1.3;
        font-weight: 600;
        animation: fadeUp 1.5s ease;
      }

      .hero p {
        color: #aaa;
        margin-top: 10px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
        }
      }

      /* MENU */
      .menu {
        padding: 120px 30px 60px;
      }

      .menu h2 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 28px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 25px;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        overflow: hidden;
        transition: 0.3s;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }

      .card-content {
        padding: 18px;
      }

      .card h3 {
        margin: 0;
      }

      .price {
        margin-top: 8px;
        color: var(--primary);
        font-weight: 600;
      }

      button {
        width: 100%;
        background: var(--primary);
        border: none;
        padding: 12px;
        border-radius: 10px;
        margin-top: 15px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
      }

      button:hover {
        background: #e09b65;
      }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 30px 20px;
        background: #000;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      footer p {
        margin: 5px 0;
        color: #aaa;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <h2>☕ Senja Coffee</h2>
      <div>
        <a href="#">Home</a>
        <a href="#menu">Menu</a>
      </div>
    </nav>

    <div class="hero">
      <div>
        <h1>Pengalaman Kopi Premium, Seperti di Kafe Dunia</h1>
        <p>Dibuat dari biji kopi terbaik Aceh</p>
      </div>
    </div>

    <div class="menu" id="menu">
      <h2>Menu Favorit</h2>

      <div class="grid">
        <div class="card">
          <img
            src="https://images.pexels.com/photos/5169122/pexels-photo-5169122.jpeg"
          />
          <div class="card-content">
            <h3>Espresso</h3>
            <div class="price">Rp 15.000</div>
            <button onclick="beliWA('Espresso', 15000)">Pesan Sekarang</button>
          </div>
        </div>

        <div class="card">
          <img
            src="https://images.pexels.com/photos/2638019/pexels-photo-2638019.jpeg"
          />
          <div class="card-content">
            <h3>Cappuccino</h3>
            <div class="price">Rp 15.000</div>
            <button onclick="beliWA('Cappuccino', 15000)">
              Pesan Sekarang
            </button>
          </div>
        </div>

        <div class="card">
          <img
            src="https://images.pexels.com/photos/19055690/pexels-photo-19055690.jpeg"
          />
          <div class="card-content">
            <h3>kopi susu</h3>
            <div class="price">Rp 12.000</div>
            <button onclick="beliWA('kopi susu', 12000)">Pesan Sekarang</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MAP SECTION -->
    <div style="padding: 40px 20px; text-align: center">
      <h2>Lokasi Kami</h2>
      <p style="color: #aaa">Temukan kedai kami dengan mudah</p>
      <br />
      <iframe
        src="https://www.google.com/maps?q=Aceh&output=embed"
        width="100%"
        height="300"
        style="border: 0; border-radius: 15px"
      >
      </iframe>
      <br /><br />
      <a href="https://www.google.com/maps?q=Aceh" target="_blank">
        <button style="max-width: 250px">📍 Buka di Google Maps</button>
      </a>
    </div>

    <footer>
      <p>📍 Aceh, Indonesia</p>
      <p>📞 0895611529242</p>
    </footer>

    <script>
      function beliWA(nama, harga) {
        let pesan = `Halo, saya ingin pesan:%0A- ${nama} (Rp ${harga})`;
        window.open(`https://wa.me/62895611529242?text=${pesan}`);
      }
    </script>
  </body>
</html>
